name: CI

on:
  push:

permissions:
  id-token: write
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wow-look-at-my/go-toolchain@v1
        with:
          autorelease: 'true'
      - name: Run samples/github/github.json demo into the step summary
        # Hits the live GitHub API; transient network/quota hiccups should not
        # fail CI when the unit tests are green. The summary is best-effort.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/demo-summary.sh

  docker:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wow-look-at-my/buildhost/.github/actions/buildhost-publish-docker@2c183bbafab5d82fc548443840196193ec40ff60
        with:
          file: samples/github/Dockerfile.github
          platforms: linux/amd64,linux/arm64
          tags: latest
