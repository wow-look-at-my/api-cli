name: CI

on:
  push:

permissions:
  id-token: write
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wow-look-at-my/go-toolchain@v1
        with:
          autorelease: 'true'
      - name: Run samples/github/github.json demo into the step summary
        # Hits the live GitHub API; transient network/quota hiccups should not
        # fail CI when the unit tests are green. The summary is best-effort.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/demo-summary.sh

  docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: go-build
          path: .
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push
        run: |
          branch_tag="$(echo "${{ github.ref_name }}" | tr '/' '-')"
          tags="--tag ghcr.io/${{ github.repository_owner }}/github:${branch_tag}"
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            tags="${tags} --tag ghcr.io/${{ github.repository_owner }}/github:latest"
          fi
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file samples/github/Dockerfile.github \
            ${tags} \
            --push \
            .
